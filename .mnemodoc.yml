paths:
  - .

ollama:
  host: http://localhost:11434
  model: nomic-embed-text
  timeout: 30
  batch_size: 10

search:
  top_k: 5
  mode: hybrid
  recency_days: 14
  recency_boost: 0.15
  keyword_weight: 0.3

server:
  log_file: stderr
  log_level: info

